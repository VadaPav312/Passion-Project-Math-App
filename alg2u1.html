<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra 2 | Professional Assessment Template</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$']] } };</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.4);
            --accent: #2dd4bf;
            --error: #f43f5e;
            --warning: #f59e0b;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(2, 6, 23, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 80px; /* Space for fixed header */
            background-image: radial-gradient(circle at 50% 0%, rgba(45, 212, 191, 0.1), transparent 50%);
        }

        /* --- NAVIGATION BAR --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            z-index: 1000;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--accent);
            text-decoration: none;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav a:hover { opacity: 1; color: var(--accent); }

        /* --- LAYOUT --- */
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }

        .test-info { text-align: center; margin-bottom: 3rem; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; margin: 0; }

        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }

        .difficulty {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .easy { background: rgba(45, 212, 191, 0.15); color: var(--accent); }
        .moderate { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .hard { background: rgba(244, 63, 94, 0.15); color: var(--error); }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-top: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        #submit-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 1.2rem;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
        }

        #submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45, 212, 191, 0.3); }

        /* --- FEEDBACK & ANIMATION AREA --- */
        #animation-zone {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            min-height: 200px;
        }

        .score-display { font-size: 4rem; font-weight: 800; font-family: 'Space Grotesk'; margin-bottom: 10px; }
        
        .feedback-text { font-size: 1.2rem; font-weight: 600; opacity: 0; transform: translateY(20px); transition: 0.5s forwards; }
        .show-feedback { opacity: 1; transform: translateY(0); }

        /* Animation Keyframes */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out 0s 2; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">MathAssist</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="tests.html">All Tests</a>
    </nav>
</header>

<div class="container">
    <div class="test-info">
        <h1 id="unit-title">Assessment Template</h1>
        <p id="test-id" style="color: #94a3b8; font-weight: 600; margin-top: 10px;"></p>
    </div>

    <div id="quiz-container">
        </div>

    <button id="submit-btn" onclick="gradeTest()">Finish & Grade</button>

    <div id="animation-zone">
        <div id="score-val" class="score-display"></div>
        <div id="feedback-msg" class="feedback-text"></div>
    </div>
</div>

<script>
    /** * DATA STRUCTURE
     * Paste your 10 test objects inside this array.
     */
    

    let currentTest;

    function init() {
        if (testBank.length === 0) {
            document.getElementById('quiz-container').innerHTML = "<p style='text-align:center; color:#94a3b8;'>No tests found. Please populate the testBank array in the code.</p>";
            return;
        }

        // 1. Randomly Select Test
        currentTest = testBank[Math.floor(Math.random() * testBank.length)];
        
        // 2. Set Metadata
        document.getElementById('unit-title').innerText = currentTest.title || "Algebra Assessment";
        
        // 3. Render Questions
        const container = document.getElementById('quiz-container');
        container.innerHTML = currentTest.questions.map((q, i) => `
            <div class="question-card" id="card-${i}">
                <span class="difficulty ${q.d}">${q.d}</span>
                <div class="q-text"><b>${i+1}.</b> ${q.q}</div>
                <input type="text" id="ans-${i}" autocomplete="off" placeholder="Answer...">
            </div>
        `).join('');
        
        if(window.MathJax) MathJax.typeset();
    }

    function gradeTest() {
        let score = 0;
        const total = currentTest.questions.length;

        currentTest.questions.forEach((q, i) => {
            const userAns = document.getElementById(`ans-${i}`).value.trim().toLowerCase();
            const correctAns = q.a.toLowerCase();
            const card = document.getElementById(`card-${i}`);

            if(userAns === correctAns) {
                score++;
                card.style.borderColor = "var(--accent)";
            } else {
                card.style.borderColor = "var(--error)";
            }
        });

        const percentage = Math.round((score / total) * 100);
        handleAnimations(percentage);
    }

    function handleAnimations(score) {
        const scoreVal = document.getElementById('score-val');
        const feedbackMsg = document.getElementById('feedback-msg');
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.style.display = "none";
        scoreVal.innerText = `${score}%`;
        feedbackMsg.classList.add('show-feedback');

        // Logic-based Animations
        if (score === 100) {
            // PERFECT SCORE: Confetti Storm
            feedbackMsg.innerText = "PERFECT! You've mastered this unit! 🏆";
            feedbackMsg.style.color = "var(--accent)";
            
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#2dd4bf', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#2dd4bf', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

        } else if (score >= 80) {
            // GREAT SCORE: Standard Confetti Burst
            feedbackMsg.innerText = "Awesome job! You're nearly there. 🌟";
            feedbackMsg.style.color = "var(--accent)";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        } else if (score >= 60) {
            // PASSING: Pulse effect
            feedbackMsg.innerText = "Good effort. Review the marked red questions! 👍";
            feedbackMsg.style.color = "var(--warning)";

        } else {
            // NEEDS WORK: Shake animation
            feedbackMsg.innerText = "Don't give up! Review the foundations and try again. 💪";
            feedbackMsg.style.color = "var(--error)";
            document.getElementById('animation-zone').classList.add('shake');
        }

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Initialize on load
    window.onload = init;
</script>

</body>
</html>
