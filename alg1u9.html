    body {

        background-color: var(--bg);
        background-image:

        padding-top: 80px;

    /* --- HEADER & LOGO --- */
    header {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        backdrop-filter: blur(12px);
        background: var(--nav-bg);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 14px 6vw;
        display: flex;
        align-items: center;
        justify-content: space-between;

    .logo {

        align-items: center;
        gap: 10px;
        text-decoration: none;
    }

    .logo-icon { 
        width: 28px; 
        height: 28px; 
        background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
        border-radius: 6px; 
        flex-shrink: 0;
    }

    .logo-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.3rem;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent; /* Fixes the background-clip error */
    }

    nav { display: flex; gap: 12px; }

    nav a {
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 220ms ease;
    }

    nav a:hover {
        border-color: rgba(45, 212, 191, 0.6);
        background: rgba(45, 212, 191, 0.08);
        color: var(--accent);
    }

    /* --- CONTENT LAYOUT --- */
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }

    .test-info { text-align: center; margin-bottom: 3rem; }
    
    h1 { 
        font-family: 'Space Grotesk', sans-serif; 
        font-size: clamp(2rem, 4vw, 2.8rem); 
        margin: 0; 
        background: linear-gradient(to bottom, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        display: inline-block;
    }

    .question-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .difficulty {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 6px;
        margin-bottom: 12px;
        display: inline-block;
    }

    .easy { background: rgba(45, 212, 191, 0.15); color: var(--accent); }
    .moderate { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .hard { background: rgba(244, 63, 94, 0.15); color: var(--error); }

    input {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--border);
        padding: 15px;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        margin-top: 15px;
        outline: none;
        transition: border-color 0.3s;
    }

    input:focus { border-color: var(--accent); }

    #submit-btn {
        background: var(--accent);
        color: #020617;
        border: none;
        padding: 1.2rem;
        border-radius: 15px;
        font-weight: 800;
        cursor: pointer;
        width: 100%;
        font-size: 1.1rem;
        transition: 0.3s;
        margin-top: 20px;
    }

    #submit-btn:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 8px 20px rgba(45, 212, 191, 0.3); 
    }

    #animation-zone {
        text-align: center;
        margin-top: 3rem;
        padding: 2rem;
    }

    .score-display { 
        font-size: 4rem; 
        font-weight: 800; 
        font-family: 'Space Grotesk', sans-serif; 
        color: var(--accent);
    }
    
    .feedback-text { 
        font-size: 1.2rem; 
        font-weight: 600; 
        color: var(--muted);
        margin-top: 10px;

    let currentTest;

    function init() {
        if (testBank.length === 0) {
            document.getElementById('quiz-container').innerHTML = "<p style='text-align:center; color:#94a3b8;'>No tests found. Please populate the testBank array in the code.</p>";
            return;
        }

        // 1. Randomly Select Test
        currentTest = testBank[Math.floor(Math.random() * testBank.length)];
        
        // 2. Set Metadata
        document.getElementById('unit-title').innerText = currentTest.title || "Algebra Assessment";
        
        // 3. Render Questions
        const container = document.getElementById('quiz-container');
        container.innerHTML = currentTest.questions.map((q, i) => `
            <div class="question-card" id="card-${i}">
                <span class="difficulty ${q.d}">${q.d}</span>
                <div class="q-text"><b>${i+1}.</b> ${q.q}</div>
                <input type="text" id="ans-${i}" autocomplete="off" placeholder="Answer...">
            </div>
        `).join('');
        
        if(window.MathJax) MathJax.typeset();
    }

    function gradeTest() {
        let score = 0;
        const total = currentTest.questions.length;

        currentTest.questions.forEach((q, i) => {
            const userAns = document.getElementById(`ans-${i}`).value.trim().toLowerCase();
            const correctAns = q.a.toLowerCase();
            const card = document.getElementById(`card-${i}`);

            if(userAns === correctAns) {
                score++;
                card.style.borderColor = "var(--accent)";
            } else {
                card.style.borderColor = "var(--error)";
            }
        });

        const percentage = Math.round((score / total) * 100);
        handleAnimations(percentage);
    }

    function handleAnimations(score) {
        const scoreVal = document.getElementById('score-val');
        const feedbackMsg = document.getElementById('feedback-msg');
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.style.display = "none";
        scoreVal.innerText = `${score}%`;
        feedbackMsg.classList.add('show-feedback');

        // Logic-based Animations
        if (score === 100) {
            // PERFECT SCORE: Confetti Storm
            feedbackMsg.innerText = "PERFECT! You've mastered this unit! 🏆";
            feedbackMsg.style.color = "var(--accent)";
            
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#2dd4bf', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#2dd4bf', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

        } else if (score >= 80) {
            // GREAT SCORE: Standard Confetti Burst
            feedbackMsg.innerText = "Awesome job! You're nearly there. 🌟";
            feedbackMsg.style.color = "var(--accent)";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        } else if (score >= 60) {
            // PASSING: Pulse effect
            feedbackMsg.innerText = "Good effort. Review the marked red questions! 👍";
            feedbackMsg.style.color = "var(--warning)";

        } else {
            // NEEDS WORK: Shake animation
            feedbackMsg.innerText = "Don't give up! Review the foundations and try again. 💪";
            feedbackMsg.style.color = "var(--error)";
            document.getElementById('animation-zone').classList.add('shake');
        }

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Initialize on load
    window.onload = init;
</script>
