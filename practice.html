<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathAssist | Practice Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <script>
    window.MathJax = {
      tex: { 
        inlineMath: [['$', '$'], ['\\(', '\\)']], 
        displayMath: [['$$', '$$']],
        processEscapes: true
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111a32;
      --accent: #2dd4bf;
      --accent-2: #f59e0b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(15, 23, 42, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.12), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(245, 158, 11, 0.12), transparent 32%),
        linear-gradient(180deg, #0b1223 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- HEADER & LOGO MATCHED TO HOMEPAGE --- */
    header {
      position: sticky; top: 0; z-index: 1000;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--nav-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 14px 6vw;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon { 
      width: 28px; 
      height: 28px; 
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
      border-radius: 6px; 
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    nav { display: flex; gap: 12px; }

    nav a {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 220ms ease;
    }

    nav a:hover {
      border-color: rgba(45, 212, 191, 0.6);
      background: rgba(45, 212, 191, 0.08);
      color: var(--accent);
    }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 6vw; }

    .hero { text-align: center; padding: 4rem 0 3rem; }
    
    .hero h1 { 
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 6vw, 3.5rem); 
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .builder-card {
      background: var(--card); 
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 25px; margin-bottom: 2.5rem;
    }

    .controls { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }

    input, select {
      width: 100%; padding: 12px; border-radius: 10px; 
      background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); 
      color: #fff; font-family: inherit; outline: none;
    }

    .action-row { display: flex; gap: 10px; justify-content: center; }

    .pill-btn {
      padding: 10px 24px; border-radius: 12px; cursor: pointer;
      font-weight: 700; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03); color: #fff;
      transition: 0.3s;
    }
    .pill-btn:hover:not(:disabled) { 
        background: rgba(45, 212, 191, 0.08);
        border-color: var(--accent); 
    }
    .pill-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    #generateBtn { background: var(--accent); color: #020617; border: none; }

    .problems-stack { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 24px; 
      padding-bottom: 50px; 
      align-items: stretch;
    }
    
    .problem-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      display: flex; flex-direction: column;
      height: 520px;
      overflow-y: auto;
      transition: transform 0.2s ease;
    }

    .problem-card::-webkit-scrollbar { width: 6px; }
    .problem-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; color: #f1f5f9; flex-shrink: 0; }

    .answer-zone { 
      background: rgba(15, 23, 42, 0.3); padding: 18px; border-radius: 16px;
      border: 1px solid var(--border); width: 100%; margin-top: auto;
      flex-shrink: 0;
    }

    .main-input {
      background: transparent; border: none; border-bottom: 2px solid var(--border);
      padding: 8px 0; color: #fff; width: 100%; font-size: 1rem; outline: none;
    }

    .analysis-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; cursor: pointer; margin-top: 10px;
    }
    .analysis-pill input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
    .analysis-pill span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }

    .explanation-area {
      margin-top: 15px; padding: 15px; border-radius: 14px;
      background: rgba(0,0,0,0.25); border-left: 3px solid var(--accent-2);
      display: none; font-size: 0.9rem; line-height: 1.6; color: #cbd5e1;
      width: 100%;
    }
    .explanation-area.active { display: block; }

    .status-msg { margin-top: 15px; text-align: center; font-size: 0.85rem; color: var(--accent); font-weight: 600; min-height: 20px; }

    @media (max-width: 850px) { .problems-stack { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } .problem-card { height: 480px; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">MathAssist</span>
    </a>
    <nav>
      <a href="index.html">Homepage</a>
      <a href="tests.html">Practice Tests</a>
      <a href="library.html">Resource Library</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Practice Lab</h1>
      <p style="color: var(--muted)">Solve problems and get instant step-by-step verification.</p>
    </section>

    <section class="builder-card">
      <div class="controls">
        <div><label>Concept</label><input id="topic" type="text" placeholder="e.g. Fractions"></div>
        <div><label>Count</label><input id="count" type="number" min="1" max="10" value="4"></div>
        <div><label>Level</label>
          <select id="difficulty">
            <option value="introductory">Introductory</option>
            <option value="intermediate" selected>Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
      </div>
      <div class="action-row">
        <button class="pill-btn" id="generateBtn">Generate</button>
        <button class="pill-btn" id="gradeBtn" disabled>Grade</button>
        <button class="pill-btn" id="explainBtn" disabled>Explain Selected</button>
      </div>
      <p class="status-msg" id="status"></p>
    </section>

    <section class="problems-stack" id="problemsGrid"></section>
  </main>

  <script>
    // JS Logic remains the same to handle the Practice Lab functionality
    const statusEl = document.getElementById('status');
    const generateBtn = document.getElementById('generateBtn');
    const gradeBtn = document.getElementById('gradeBtn');
    const explainBtn = document.getElementById('explainBtn');
    const problemsGrid = document.getElementById('problemsGrid');

    let problems = [];

    function robustParse(raw) {
      try {
        let clean = raw.replace(/```json/gi, "").replace(/```/g, "").trim();
        const start = Math.min(
          clean.indexOf('[') === -1 ? Infinity : clean.indexOf('['), 
          clean.indexOf('{') === -1 ? Infinity : clean.indexOf('{')
        );
        const end = Math.max(clean.lastIndexOf(']'), clean.lastIndexOf('}'));
        clean = clean.substring(start, end + 1);
        return JSON.parse(clean);
      } catch (e) {
        console.error("Parse error:", e);
        throw new Error("Formatting error. Please try generating again.");
      }
    }

    function render() {
      problemsGrid.innerHTML = problems.map((p, i) => `
        <div class="problem-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <span style="font-weight:900; font-size:0.6rem; color:var(--muted); letter-spacing:1px;">PROBLEM 0${i + 1}</span>
            <span id="badge-${i}" style="font-size:0.6rem; font-weight:800; color:var(--muted);">WAITING</span>
          </div>
          <div class="question-text">${p.question}</div>
          <div class="answer-zone">
            <input type="text" class="main-input" placeholder="Enter answer..." data-answer>
            <label class="analysis-pill">
              <input type="checkbox" data-select>
              <span>Include in Analysis</span>
            </label>
          </div>
          <div class="explanation-area" id="exp-${i}">
            <div id="feedback-${i}"></div>
          </div>
        </div>
      `).join('');
      
      if (window.MathJax) MathJax.typesetPromise();
    }

    async function callAI(messages) {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      return data.content;
    }

    async function generate() {
      const topic = document.getElementById('topic').value || 'Math';
      const difficulty = document.getElementById('difficulty').value;
      setBusy(`Generating ${difficulty} problems...`);
      
      const system = `You are a math expert. Generate problems for the ${difficulty} level.
      Return ONLY JSON: {"problems": [{"question": "...", "answer": "..."}]}. 
      Use $...$ for LaTeX. Escape backslashes as \\\\ (e.g. \\\\frac).`;
      
      try {
        const content = await callAI([
          {role: 'system', content: system}, 
          {role: 'user', content: `Topic: ${topic}, Count: ${document.getElementById('count').value}`}
        ]);
        problems = robustParse(content).problems;
        render();
        clearBusy("Ready.");
      } catch (e) { clearBusy(e.message); }
    }

    async function grade() {
      const inputs = Array.from(problemsGrid.querySelectorAll('[data-answer]'));
      const payload = problems.map((p, i) => ({ 
        index: i, 
        q: p.question, 
        correct: p.answer, 
        student: inputs[i].value || "[No Answer]" 
      }));

      setBusy("Grading...");
      const system = "Grade these answers. If equivalent, status is 'ok'. Return ONLY JSON: [{\"index\": number, \"status\": \"ok\"|\"no\", \"feedback\": \"...\"}].";

      try {
        const content = await callAI([
          {role: 'system', content: system}, 
          {role: 'user', content: JSON.stringify(payload)}
        ]);
        
        const results = robustParse(content);
        (Array.isArray(results) ? results : []).forEach(r => {
          const idx = r.index;
          const badge = document.getElementById(`badge-${idx}`);
          const feedbackEl = document.getElementById(`feedback-${idx}`);
          
          const isCorrect = r.status === 'ok';
          badge.textContent = isCorrect ? 'CORRECT' : 'INCORRECT';
          badge.style.color = isCorrect ? 'var(--accent)' : 'var(--accent-2)';
          
          if (feedbackEl) feedbackEl.innerHTML = `<b>Feedback:</b> ${r.feedback}`;
        });

        if (window.MathJax) MathJax.typesetPromise();
        clearBusy("Grading finished.");
      } catch (e) { clearBusy("Error grading."); }
    }

    async function explain() {
      const selected = [];
      problems.forEach((p, i) => {
        if (problemsGrid.children[i].querySelector('[data-select]').checked) {
          selected.push({ index: i, question: p.question, answer: p.answer });
        }
      });

      if (!selected.length) return alert("Please check the 'Include in Analysis' box for the problems you want explained.");

      setBusy("Generating explanations...");
      const system = "Provide step-by-step derivations. Use $...$ for all math. Return ONLY JSON array: [{\"index\": number, \"explanation\": \"...\"}].";

      try {
        const content = await callAI([
          {role: 'system', content: system}, 
          {role: 'user', content: JSON.stringify(selected)}
        ]);
        
        const results = robustParse(content);
        (Array.isArray(results) ? results : []).forEach(r => {
          const feedbackEl = document.getElementById(`feedback-${r.index}`);
          const expArea = document.getElementById(`exp-${r.index}`);
          
          if (feedbackEl && expArea) {
            const currentFeedback = feedbackEl.innerHTML.includes("Feedback") ? feedbackEl.innerHTML + "<br><br>" : "";
            feedbackEl.innerHTML = `${currentFeedback}<b>Step-by-Step:</b><br>${r.explanation}`;
            expArea.classList.add('active'); 
          }
        });

        if (window.MathJax) MathJax.typesetPromise();
        clearBusy("Explanations ready.");
      } catch (e) { clearBusy("Error generating steps."); }
    }

    function setBusy(text) {
      statusEl.textContent = text;
      [generateBtn, gradeBtn, explainBtn].forEach(b => b.disabled = true);
    }

    function clearBusy(text) {
      statusEl.textContent = text;
      generateBtn.disabled = false;
      gradeBtn.disabled = problems.length === 0;
      explainBtn.disabled = problems.length === 0;
    }

    generateBtn.addEventListener('click', generate);
    gradeBtn.addEventListener('click', grade);
    explainBtn.addEventListener('click', explain);
  </script>
</body>
</html>
