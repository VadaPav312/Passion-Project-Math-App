<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathAssist | Practice Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --bg: #020617;
      --card: rgba(30, 41, 59, 0.4);
      --accent: #2dd4bf;
      --accent-glow: rgba(45, 212, 191, 0.3);
      --accent-2: #f59e0b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(45, 212, 191, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.1) 0%, transparent 40%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(2, 6, 23, 0.7);
      border-bottom: 1px solid var(--border);
      padding: 1rem 6vw;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 1.3rem;
      display: flex; gap: 10px; align-items: center;
    }

    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 6px; }

    nav { display: flex; gap: 12px; }
    nav a {
      color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600;
      padding: 8px 14px; border-radius: 8px; transition: 0.2s;
    }
    nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 6vw; }

    .hero { text-align: center; padding: 2rem 0; }
    
    .hero h1 { 
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem); 
      background: linear-gradient(to bottom, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
      margin-bottom: 0.5rem;
    }

    .builder-card {
      background: var(--card); backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 25px; margin-bottom: 2.5rem;
    }

    .controls { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }

    input, select {
      width: 100%; padding: 12px; border-radius: 10px; 
      background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); 
      color: #fff; font-family: inherit; outline: none;
    }

    .action-row { display: flex; gap: 10px; justify-content: center; }

    .pill-btn {
      padding: 10px 24px; border-radius: 12px; cursor: pointer;
      font-weight: 700; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03); color: #fff;
      transition: 0.3s;
    }
    .pill-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); }
    .pill-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    #generateBtn { background: var(--accent); color: #020617; border: none; }

    .problems-stack { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; padding-bottom: 50px; }
    
    .problem-card {
      background: var(--card); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 24px;
      display: flex; flex-direction: column; height: fit-content;
    }

    .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; color: #f1f5f9; min-height: 60px; }

    .answer-zone { 
      background: rgba(15, 23, 42, 0.3); padding: 18px; border-radius: 16px;
      border: 1px solid var(--border); width: 100%; display: block;
    }

    .main-input {
      background: transparent; border: none; border-bottom: 2px solid var(--border);
      padding: 8px 0; color: #fff; width: 100%; font-size: 1rem; outline: none;
    }

    .analysis-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; cursor: pointer; margin-top: 10px;
    }
    .analysis-pill input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
    .analysis-pill span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }

    .explanation-area {
      margin-top: 15px; padding: 15px; border-radius: 14px;
      background: rgba(0,0,0,0.25); border-left: 3px solid var(--accent-2);
      display: none; font-size: 0.9rem; line-height: 1.6; color: #cbd5e1;
      width: 100%;
    }
    .explanation-area.active { display: block; }

    .status-msg { margin-top: 15px; text-align: center; font-size: 0.85rem; color: var(--accent); font-weight: 600; min-height: 20px; }

    @media (max-width: 850px) { .problems-stack { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo"><div class="logo-icon"></div>MathAssist</div>
    <nav>
      <a href="index.html">Homepage</a>
      <a href="tests.html">Practice Tests</a>
      <a href="library.html">Resource Library</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Practice Lab</h1>
      <p>Solve problems and get instant step-by-step verification.</p>
    </section>

    <section class="builder-card">
      <div class="controls">
        <div><label>Concept</label><input id="topic" type="text" placeholder="e.g. Fractions"></div>
        <div><label>Count</label><input id="count" type="number" min="1" max="10" value="4"></div>
        <div><label>Level</label>
          <select id="difficulty">
            <option value="introductory">Introductory</option>
            <option value="intermediate" selected>Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
      </div>
      <div class="action-row">
        <button class="pill-btn" id="generateBtn">Generate</button>
        <button class="pill-btn" id="gradeBtn" disabled>Grade</button>
        <button class="pill-btn" id="explainBtn" disabled>Explain Selected</button>
      </div>
      <p class="status-msg" id="status"></p>
    </section>

    <section class="problems-stack" id="problemsGrid"></section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const generateBtn = document.getElementById('generateBtn');
    const gradeBtn = document.getElementById('gradeBtn');
    const explainBtn = document.getElementById('explainBtn');
    const problemsGrid = document.getElementById('problemsGrid');

    let problems = [];

    /**
     * Updated Robust Parser:
     * Focuses on keeping characters basic and preventing double-escaping 
     * common in AI LaTeX JSON outputs.
     */
    function robustParse(raw) {
      try {
        let clean = raw.replace(/```json/gi, "").replace(/```/g, "").trim();
        const start = Math.min(clean.indexOf('[') === -1 ? Infinity : clean.indexOf('['), clean.indexOf('{') === -1 ? Infinity : clean.indexOf('{'));
        const end = Math.max(clean.lastIndexOf(']'), clean.lastIndexOf('}'));
        clean = clean.substring(start, end + 1);
        
        // Remove common "random character" glitches like excessive backslashes or weird Unicode escapes
        return JSON.parse(clean);
      } catch (e) {
        // If JSON.parse fails, we try a softer approach for backslashes
        try {
            let softClean = raw.replace(/\\/g, "\\\\").replace(/\\\\"/g, "\\\"");
            return JSON.parse(softClean);
        } catch (e2) {
            console.error("Parse error:", e);
            throw new Error("Formatting error. Please try generating again.");
        }
      }
    }

    async function callAI(messages) {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      return data.content;
    }

    function render() {
      problemsGrid.innerHTML = problems.map((p, i) => `
        <div class="problem-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <span style="font-weight:900; font-size:0.6rem; color:var(--muted); letter-spacing:1px;">PROBLEM 0${i+1}</span>
            <span id="badge-${i}" style="font-size:0.6rem; font-weight:800; color:var(--muted);">WAITING</span>
          </div>
          <div class="question-text">${p.question}</div>
          <div class="answer-zone">
            <input type="text" class="main-input" placeholder="Enter answer..." data-answer>
            <label class="analysis-pill">
              <input type="checkbox" data-select>
              <span>Include in Analysis</span>
            </label>
          </div>
          <div class="explanation-area" id="exp-${i}">
            <div id="feedback-${i}"></div>
          </div>
        </div>
      `).join('');
      MathJax.typesetPromise();
    }

    async function generate() {
      const topic = document.getElementById('topic').value || 'Math';
      setBusy("Generating unique problems...");
      // PROMPT UPDATED: Added "Use basic characters" and strict formatting rules.
      const system = `Create math problems. Return ONLY JSON: {"problems": [{"question": "...", "answer": "..."}]}. 
      RULES:
      1. Use basic, readable text.
      2. Use simple $...$ for LaTeX. 
      3. Avoid extra escaping or non-standard characters. 
      4. Never repeat numbers.`;
      
      try {
        const content = await callAI([{role:'system', content:system}, {role:'user', content:`Topic: ${topic}, Count: ${document.getElementById('count').value}`}]);
        problems = robustParse(content).problems;
        render();
        clearBusy("Ready.");
      } catch (e) { clearBusy(e.message); }
    }

    async function grade() {
      const inputs = Array.from(problemsGrid.querySelectorAll('[data-answer]'));
      const payload = problems.map((p, i) => ({ 
        index: i, 
        q: p.question, 
        correct: p.answer, 
        student: inputs[i].value || "[No Answer]" 
      }));

      setBusy("Grading...");
      
      const system = `Grade these. Evaluate for mathematical equivalence (e.g., 0.5 is the same as 1/2). 
      Return ONLY a JSON array: [{"index": number, "status": "ok"|"no", "feedback": "..."}]. 
      Keep feedback basic and direct.`;

      try {
        const content = await callAI([
          {role:'system', content:system}, 
          {role:'user', content: JSON.stringify(payload)}
        ]);
        
        const results = robustParse(content);
        // Normalize: ensures we get an array even if the AI wraps it in an object
        const finalResults = Array.isArray(results) ? results : (results.results || results.grading || results.problems || []);

        finalResults.forEach(r => {
          // Robust index check: handles 'index', 'idx', or 'i'
          const idx = r.index !== undefined ? r.index : (r.idx !== undefined ? r.idx : r.i);
          
          if (idx !== undefined && idx < problems.length) {
            const badge = document.getElementById(`badge-${idx}`);
            const feedbackEl = document.getElementById(`feedback-${idx}`);
            const expArea = document.getElementById(`exp-${idx}`);

            // Update Badge (Correct/Incorrect)
            const isCorrect = r.status === 'ok' || r.status === 'correct' || r.status === 'YES';
            badge.textContent = isCorrect ? 'CORRECT' : 'INCORRECT';
            badge.style.color = isCorrect ? 'var(--accent)' : 'var(--accent-2)';

            // Update Feedback text
            if (feedbackEl) {
              feedbackEl.innerHTML = `<b>Feedback:</b> ${r.feedback}`;
            }

            // Reveal the explanation area
            if (expArea) {
              expArea.classList.add('active');
            }
          }
        });

        MathJax.typesetPromise();
        clearBusy("Grading finished.");
      } catch (e) { 
        console.error("Grading Error:", e);
        clearBusy("Error grading. Check console for details."); 
      }
    }

    async function explain() {
      const selected = [];
      problems.forEach((p, i) => {
        // Check if the specific checkbox for problem 'i' is checked
        if (problemsGrid.children[i].querySelector('[data-select]').checked) {
          // We pass the ORIGINAL index 'i' so the AI can return it to us
          selected.push({ index: i, question: p.question, answer: p.answer });
        }
      });

      if (!selected.length) return alert("Select at least one problem using the 'Include in Analysis' checkbox.");

      setBusy("Thinking...");
      
      const system = `Provide step-by-step derivations. Return ONLY a JSON array: [{"index": number, "explanation": "..."}]. 
      RULES:
      1. IMPORTANT: The "index" in your response MUST match the "index" provided in the request.
      2. Use clear, basic characters and simple $...$ LaTeX. 
      3. No messy symbols or excessive slashes. 
      4. Explain step-by-step plainly and make it easy to read.`;

      try {
        const content = await callAI([
          {role:'system', content:system}, 
          {role:'user', content: JSON.stringify(selected)}
        ]);
        
        const results = robustParse(content);
        // Normalize results to handle different AI JSON structures
        const finalResults = Array.isArray(results) ? results : (results.explanations || results.results || []);

        finalResults.forEach(r => {
          // We use the index 'r.index' returned by the AI to find the EXACT box
          const idx = r.index !== undefined ? r.index : r.i;
          
          const feedbackEl = document.getElementById(`feedback-${idx}`);
          const expArea = document.getElementById(`exp-${idx}`);
          
          if (feedbackEl && expArea) {
            feedbackEl.innerHTML = `<b>Derivation:</b><br>${r.explanation}`;
            expArea.classList.add('active');
          }
        });

        MathJax.typesetPromise();
        clearBusy("Explanations ready.");
      } catch (e) { 
        console.error(e);
        clearBusy("Error generating steps. Try again."); 
      }
    }

    function setBusy(text) {
      statusEl.textContent = text;
      [generateBtn, gradeBtn, explainBtn].forEach(b => b.disabled = true);
    }

    function clearBusy(text) {
      statusEl.textContent = text;
      generateBtn.disabled = false;
      gradeBtn.disabled = problems.length === 0;
      explainBtn.disabled = problems.length === 0;
    }

    generateBtn.addEventListener('click', generate);
    gradeBtn.addEventListener('click', grade);
    explainBtn.addEventListener('click', explain);
  </script>
</body>
</html>
